<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Marwa Mahmoud Elsayed — Frontend Engineer. Angular, React, Next.js, TypeScript. Bilingual EN/AR (RTL)."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('marwa-theme')
          if (theme !== 'light' && theme !== 'dark') {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
          }
          document.documentElement.dataset.theme = theme
          var locale = localStorage.getItem('marwa-locale')
          if (locale === 'ar') {
            document.documentElement.lang = 'ar'
            document.documentElement.dir = 'rtl'
          }
        } catch (e) {}
      })()
    </script>
    <title>Marwa Mahmoud — Frontend Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
